name: Tag Release

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'

concurrency:
  group: tag-release

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create version tag
        run: |
          set -euo pipefail

          version=$(yq --front-matter=extract '.metadata.version' skills/hikyaku-planner/SKILL.md)

          if [ -z "${version}" ]; then
            echo "::error::Version extracted from SKILL.md is empty."
            exit 1
          fi

          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${version}' is not in the expected X.Y.Z format."
            exit 1
          fi

          tag="v${version}"

          if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists — skipping."
            exit 0
          fi

          git tag "$tag"
          git push origin "$tag"
          echo "Created tag: $tag"
